PLG_USER_JOOMLALABS_PROFILES_AUTOPROFILE="JoomlaLABS Profiles Auto Profile"
PLG_USER_JOOMLALABS_PROFILES_AUTOPROFILE_XML_DESCRIPTION="Automatically creates a profile when a Joomla user is created."
PLG_USER_JOOMLALABS_PROFILES_AUTOPROFILE_FIELD_DEFAULT_CATEGORY_LABEL="Default category"
PLG_USER_JOOMLALABS_PROFILES_AUTOPROFILE_FIELD_DEFAULT_CATEGORY_DESC="Required. This selected category is used for auto-create and update-on-edit checks."
PLG_USER_JOOMLALABS_PROFILES_AUTOPROFILE_FIELD_DISPLAY_NAME_PATTERN_OVERRIDE_LABEL="Display name pattern override"
PLG_USER_JOOMLALABS_PROFILES_AUTOPROFILE_FIELD_DISPLAY_NAME_PATTERN_OVERRIDE_DESC="Optional pattern that overrides category display-name logic for auto-created profiles. Supported tokens: {name}, {username}/{login_name}, {email}, {usercf:field_name}."
PLG_USER_JOOMLALABS_PROFILES_AUTOPROFILE_FIELD_CUSTOM_FIELD_AUTOMAP_LABEL="User to profile custom field automap"
PLG_USER_JOOMLALABS_PROFILES_AUTOPROFILE_FIELD_CUSTOM_FIELD_AUTOMAP_DESC="Optional repeatable list of mappings used during auto-creation. User source shows standard tokens plus user custom fields; profile destination is filtered by the selected default category."
PLG_USER_JOOMLALABS_PROFILES_AUTOPROFILE_FIELD_AUTOMAP_USER_SOURCE_LABEL="User source"
PLG_USER_JOOMLALABS_PROFILES_AUTOPROFILE_FIELD_AUTOMAP_USER_SOURCE_DESC="Select a standard user token ({name}, {username}, {email}, {login_name}) or a user custom field source."
PLG_USER_JOOMLALABS_PROFILES_AUTOPROFILE_FIELD_AUTOMAP_PROFILE_FIELD_LABEL="Profile destination field"
PLG_USER_JOOMLALABS_PROFILES_AUTOPROFILE_FIELD_AUTOMAP_PROFILE_FIELD_DESC="Select the destination profile custom field (from the selected default category) to fill with the source value."
PLG_USER_JOOMLALABS_PROFILES_AUTOPROFILE_FIELD_AUTOPUBLISH_LABEL="Publish created profile"
PLG_USER_JOOMLALABS_PROFILES_AUTOPROFILE_FIELD_SYNC_ON_USER_EDIT_LABEL="Update existing profile on user edit"
PLG_USER_JOOMLALABS_PROFILES_AUTOPROFILE_FIELD_SYNC_ON_USER_EDIT_DESC="When enabled, editing a Joomla user updates the existing JoomlaLABS profile in the selected default category. It does not create a new profile by itself."
PLG_USER_JOOMLALABS_PROFILES_AUTOPROFILE_FIELD_CREATE_ON_USER_EDIT_IF_MISSING_LABEL="Allow create on user edit when no profile exists in selected category"
PLG_USER_JOOMLALABS_PROFILES_AUTOPROFILE_FIELD_CREATE_ON_USER_EDIT_IF_MISSING_DESC="Used only during user edit and only when update-on-edit is enabled. If no profile exists in the selected category (the required Default category), a new one is created."
PLG_USER_JOOMLALABS_PROFILES_AUTOPROFILE_FIELD_SKIP_EXISTING_LABEL="Block auto-create if user already has any profile"
PLG_USER_JOOMLALABS_PROFILES_AUTOPROFILE_FIELD_SKIP_EXISTING_DESC="Global create guard for auto-create flows (new user and edit-if-missing): if the user already has at least one linked profile, no new profile is auto-created. Existing profiles can still be updated."
